name: Import Audit Monitor Update

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/import-audit-update.yml"

permissions:
  contents: write
  pages: write
  id-token: write

env:
  SOURCE_BASE: "https://6e9ef70c1a49e7.lhr.life"

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  import-refresh-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import audit-enabled source and prepared SEC snapshot
        run: |
          mkdir -p data
          curl -fL --retry 5 --retry-delay 5 "$SOURCE_BASE/cloud_pages_monitor.py" -o cloud_pages_monitor.py
          curl -fL --retry 5 --retry-delay 5 "$SOURCE_BASE/fundamentals_snapshot.json.gz.b64" -o data/fundamentals_snapshot.json.gz.b64
          python -m py_compile cloud_pages_monitor.py

      - name: Validate and split SEC audit snapshot
        run: |
          python - <<'PY'
          import base64, gzip, json
          from pathlib import Path
          raw = base64.b64decode(Path("data/fundamentals_snapshot.json.gz.b64").read_text())
          snapshot = json.loads(gzip.decompress(raw).decode("utf-8"))
          count = len(snapshot.get("fundamentals", {}))
          if count < 450:
              raise SystemExit(f"weak fundamentals snapshot: {count} companies")
          first = next(iter(snapshot.get("fundamentals", {}).values()))
          if not ((first.get("data_audit") or {}).get("selected_facts")):
              raise SystemExit("snapshot lacks tag-level SEC audit facts")
          print(f"SEC fundamentals snapshot companies: {count}")
          PY
          rm -f data/fundamentals_snapshot.part*
          split -b 5000 -d -a 3 data/fundamentals_snapshot.json.gz.b64 data/fundamentals_snapshot.part
          rm -f data/fundamentals_snapshot.json.gz.b64
          date -u +%Y-%m-%dT%H:%M:%SZ > data/deploy_trigger.txt

      - name: Commit imported source and refreshed snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cloud_pages_monitor.py
          git add -A data
          git commit -m "Add audit trail to S&P 500 monitor"
          git push

      - name: Rebuild fundamentals snapshot
        run: |
          cat data/fundamentals_snapshot.part* | tr -d '\n' > data/fundamentals_snapshot.json.gz.b64

      - name: Generate full S&P 500 rankings
        env:
          PREFER_FUNDAMENTALS_SNAPSHOT: "1"
        run: |
          python cloud_pages_monitor.py --limit 0 --sleep 0.0

      - name: Validate generated artifacts
        run: |
          python -m json.tool data/latest_rankings.json >/dev/null
          python -m json.tool dist/data/latest_rankings.json >/dev/null
          python -m json.tool dist/manifest.json >/dev/null
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("data/latest_rankings.json").read_text())
          rows = data.get("companies") or []
          rankable = data.get("metadata", {}).get("rankable_companies", 0)
          if rankable < 10:
              raise SystemExit(f"too few rankable rows: {rankable}")
          missing_audit = [r.get("ticker") for r in rows if "audit" not in r]
          if missing_audit:
              raise SystemExit(f"missing audit payload for {missing_audit[:5]}")
          fact_rows = sum(len(((r.get("audit") or {}).get("sec_facts") or {})) for r in rows)
          if fact_rows < 500:
              raise SystemExit(f"too few SEC fact audit entries: {fact_rows}")
          print(f"processed rows: {len(rows)}; rankable rows: {rankable}; SEC fact fields: {fact_rows}")
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
