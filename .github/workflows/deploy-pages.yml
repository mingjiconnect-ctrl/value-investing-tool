name: Refresh and Deploy S&P 500 Monitor

on:
  workflow_dispatch:
  schedule:
    # 21:30 UTC Monday-Friday = 05:30 Asia/Shanghai Tuesday-Saturday.
    # This runs after the regular US market close in both EST and EDT.
    - cron: "30 21 * * 1-5"
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate full S&P 500 rankings
        env:
          SEC_USER_AGENT: "sp500-monitor/0.1 https://github.com/${{ github.repository }}"
        run: |
          mkdir -p data
          python - <<'PY'
          import json
          from pathlib import Path

          Path("data/fundamentals_snapshot.json.gz.b64").write_text("""""", encoding="utf-8")

          import cloud_pages_monitor as monitor

          snapshot = monitor.fundamentals_snapshot()
          universe = monitor.sp500()
          allowed = {c.ticker for c in universe if c.cik in snapshot.get("fundamentals", {})}
          original_price = monitor.price

          monitor.print = lambda *args, **kwargs: None
          monitor.sp500 = lambda: universe

          def prefer_snapshot_facts(cik):
              raise RuntimeError("prefer_fundamentals_snapshot")

          def candidate_price(ticker):
              if ticker not in allowed:
                  return {"price": None, "currency": None, "market_time": None}
              return original_price(ticker)

          monitor.facts = prefer_snapshot_facts
          monitor.price = candidate_price
          payload = monitor.run(0, 0.0)
          payload["metadata"]["errors"] = [
              e for e in payload["metadata"]["errors"]
              if e.get("error") != "prefer_fundamentals_snapshot"
          ]
          payload["metadata"]["source_notes"].insert(
              1,
              "Cloud deploy uses a committed SEC-derived MVP fundamentals snapshot for current rankable candidates; market prices are refreshed during each run.",
          )
          monitor.OUT.write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")
          monitor.validate_payload(payload)
          monitor.build(payload)
          meta = payload["metadata"]
          print(f"Built S&P 500 monitor: {meta['rankable_companies']} rankable / {meta['processed_companies']} processed")
          print("Value top 10:", ", ".join(r["ticker"] for r in payload["value_top_10"]))
          print("Growth top 10:", ", ".join(r["ticker"] for r in payload["growth_top_10"]))
          PY

      - name: Validate generated artifacts
        run: |
          python -m json.tool data/latest_rankings.json >/dev/null
          python -m json.tool dist/data/latest_rankings.json >/dev/null
          python -m json.tool dist/manifest.json >/dev/null

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
